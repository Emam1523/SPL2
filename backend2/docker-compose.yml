services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab_analytics
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - lab_analytics_pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8010"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_NAME: Backend2 API
      APP_ENV: development
      APP_DEBUG: "false"
      API_PREFIX: /api/v1
      MAX_UPLOAD_MB: "10"
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://localhost:5174
      AI_CONVERSATION_PROVIDER: ollama
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/lab_analytics
      AI_CONVERSATION_OLLAMA_URL: http://host.docker.internal:11434/api/chat
      AI_CONVERSATION_OLLAMA_MODEL: llama3:8b
      # Optional Groq configuration:
      # AI_CONVERSATION_PROVIDER: groq
      # AI_CONVERSATION_GROQ_API_KEY: your-groq-api-key
      # AI_CONVERSATION_GROQ_MODEL: llama-3.3-70b-versatile
      # AI_CONVERSATION_GROQ_BASE_URL: https://api.groq.com/openai/v1
    ports:
      - "8010:8010"
volumes:
  lab_analytics_pgdata:
